<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Feed</title>

<style>
body{
    margin:0;
    background:#0f0f0f;
    font-family:Arial;
    color:white;
}
.grid{
    display:grid;
    grid-template-columns:1fr;
    gap:10px;
    padding:10px;
    padding-bottom:70px;
}
.video-card{
    display:flex;
    gap:10px;
    background:#1a1a1a;
    padding:8px;
    border-radius:12px;
    cursor:pointer;
}
.thumb{
    position:relative;
    width:140px;
    flex-shrink:0;
}
.thumb video{
    width:100%;
    height:90px;
    object-fit:cover;
    border-radius:10px;
}
.play-overlay{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    font-size:26px;
    background:rgba(0,0,0,0.6);
    border-radius:50%;
    padding:6px 10px;
}
.title{
    font-size:13px;
    color:#ddd;
    line-height:1.3;
}
.navbar{
    position:fixed;
    bottom:0;
    left:0;
    width:100%;
    background:#111;
    display:flex;
    justify-content:space-around;
    padding:10px 0;
    border-top:1px solid #222;
}
.navbar div{
    font-size:12px;
    opacity:0.7;
}
.navbar .active{
    opacity:1;
    font-weight:bold;
}
#player{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:black;
    display:none;
    justify-content:center;
    align-items:center;
    z-index:999;
    flex-direction:column;
}
#player video{
    width:95%;
    max-width:500px;
}
#closeBtn{
    position:absolute;
    top:15px;
    right:20px;
    font-size:30px;
    cursor:pointer;
}
</style>
</head>

<body>

<div id="app" class="grid"></div>

<div class="navbar">
    <div class="active">Home</div>
    <div>Trending</div>
    <div>Profile</div>
</div>

<div id="player">
    <span id="closeBtn">✕</span>
    <video id="mainVideo" controls playsinline></video>
</div>

<script>
const ad = "https://omg10.com/4/10005133";

const videoList = [
  ["https://cdn2.videy.co/1b889f451.mp4","SV454N4 M4L4M T3R454 L3B1H D4L4M"],
  ["https://cdn2.videy.co/d34065791.mp4","P4ND4N94N S1NGK4T M3MBV4T H4T1 D14M"],
  ["https://cdn2.videy.co/UKIT0mDz1.mp4","K3H3N1NG4N M3N3M4N1 M4L4M P4NJ4NG"],
  ["https://cdn2.videy.co/I0wh6BxJ1.mp4","R454 H4LVS M3NG4L1R T4NP4 SV4R4"],
  ["https://cdn2.videy.co/76OnP48C1.mp4","G3R4K P3L4N M3MBV4W4 SV454N4 B4RV"],
  ["https://cdn2.videy.co/ZMTMRAzL1.mp4","M4T4 Y4NG D14M M3NY1MP4N B4NY4K R454"],
  ["https://cdn2.videy.co/eW6cs9AQ1.mp4","D3K4P M4L4M T3R454 T3R454 H4NG4T"],
  ["https://cdn2.videy.co/uwCAvSln1.mp4","P1K1R4N J4VH N4MVN R454 T3T4P D3K4T"],
  ["https://cdn2.videy.co/0N7aTTuC1.mp4","SV454N4 S4NT41 M3MBV4T W4KTU M3L4MB4T"],
  ["https://cdn2.videy.co/nRyNcRrS1.mp4","T4T4P4N P3N3H M4KN4 T4NP4 K4T4"],
  ["https://cdn2.videy.co/80f5k3CX1.mp4","M4L4M S3P1 M3N1NGG4LK4N K3S4N D4L4M"],
  ["https://cdn2.videy.co/2otnBByR1.mp4","R454 P3L4N M3MBV4T H4T1 T3N4NG"],
  ["https://cdn2.videy.co/z0p6JDEV1.mp4","D14M Y4NG T3R454 JVSTRV M3N3N4NGK4N"],
  ["https://cdn2.videy.co/nKDECBZR1.mp4","SV454N4 H3N1NG M3N1NGG4LK4N R454"],
  ["https://cdn2.videy.co/Z42u3hqk1.mp4","W4KTU B3RJ4L4N N4MVN R454 T3T4P 4D4"]
];

const app = document.getElementById("app");
const player = document.getElementById("player");
const mainVideo = document.getElementById("mainVideo");
const closeBtn = document.getElementById("closeBtn");

videoList.forEach(v => {

    const card = document.createElement("div");
    card.className = "video-card";

    const thumb = document.createElement("div");
    thumb.className = "thumb";

    const vid = document.createElement("video");
    vid.src = v[0];
    vid.muted = true;
    vid.preload = "metadata";
    vid.playsInline = true;

    const play = document.createElement("div");
    play.className = "play-overlay";
    play.innerHTML = "▶";

    thumb.appendChild(vid);
    thumb.appendChild(play);

    const title = document.createElement("div");
    title.className = "title";
    title.innerHTML = v[1];

    card.appendChild(thumb);
    card.appendChild(title);
    app.appendChild(card);

    card.onclick = () => {
        player.style.display = "flex";
        mainVideo.src = v[0];
        mainVideo.currentTime = 0;
        mainVideo.play();

        // IKLAN AWAL (KLIK)
        window.open(ad,"_blank");

        let ad20 = false;
        let ad40 = false;

        mainVideo.ontimeupdate = () => {
            const t = Math.floor(mainVideo.currentTime);

            if(t >= 20 && !ad20){
                ad20 = true;
                window.open(ad,"_blank");
            }

            if(t >= 40 && !ad40){
                ad40 = true;
                window.open(ad,"_blank");
            }
        };
    };
});

closeBtn.onclick = () => {
    mainVideo.pause();
    mainVideo.src = "";
    player.style.display = "none";
};
</script>

</body>
</html>
